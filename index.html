<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>THE BACKROOMS — Interactive Lore Archive</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚪</text></svg>">
</head>
<body>

  <!-- VHS Overlay -->
  <div id="vhs-overlay">
    <div class="scanlines"></div>
    <div class="vhs-noise"></div>
  </div>

  <!-- Dust Particle Canvas -->
  <canvas id="dust-canvas"></canvas>

  <!-- Header -->
  <header id="main-header">
    <div class="header-content">
      <h1 class="flicker glitch-text" data-text="THE BACKROOMS">THE BACKROOMS</h1>
      <p class="subtitle">If you're not careful and noclip out of reality, you'll end up in the Backrooms.</p>
      <div class="header-actions">
        <button id="noclip-btn" title="Noclip to a random level">
          <span class="btn-glitch" data-text="NOCLIP">NOCLIP</span>
        </button>
        <button id="audio-toggle" title="Toggle ambient hum">
          <span id="audio-icon">🔇</span> AMBIENT
        </button>
      </div>
    </div>
  </header>

  <!-- App Container -->
  <div id="app-container">

    <!-- Sidebar Navigation -->
    <nav id="sidebar">
      <div class="nav-tabs">
        <button class="tab-btn active" data-tab="levels">
          <span class="tab-icon">🏢</span>
          <span class="tab-label">Levels</span>
          <span class="tab-count" id="count-levels"></span>
        </button>
        <button class="tab-btn" data-tab="entities">
          <span class="tab-icon">👁️</span>
          <span class="tab-label">Entities</span>
          <span class="tab-count" id="count-entities"></span>
        </button>
        <button class="tab-btn" data-tab="groups">
          <span class="tab-icon">👥</span>
          <span class="tab-label">Groups</span>
          <span class="tab-count" id="count-groups"></span>
        </button>
        <button class="tab-btn" data-tab="objects">
          <span class="tab-icon">🧴</span>
          <span class="tab-label">Objects</span>
          <span class="tab-count" id="count-objects"></span>
        </button>
      </div>
      <div id="search-box">
        <input type="text" placeholder="Search the Backrooms..." id="search-input" autocomplete="off">
        <div class="search-icon">⌕</div>
      </div>
      <div id="danger-filter">
        <span class="filter-label">Filter by danger:</span>
        <div class="filter-buttons">
          <button class="filter-btn active" data-danger="all">All</button>
          <button class="filter-btn safe" data-danger="1">Safe</button>
          <button class="filter-btn caution" data-danger="2">Caution</button>
          <button class="filter-btn unsafe" data-danger="3">Unsafe</button>
          <button class="filter-btn hostile" data-danger="4">Hostile</button>
          <button class="filter-btn deadzone" data-danger="5">Deadzone</button>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="content">
      <div id="list-view"></div>
      <div id="detail-view" class="hidden"></div>
    </main>

  </div>

  <!-- Noclip Overlay -->
  <div id="noclip-overlay" class="hidden">
    <div class="noclip-text">NOCLIPPING...</div>
    <div class="noclip-static"></div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
